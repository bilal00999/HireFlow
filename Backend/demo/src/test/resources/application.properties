# Integration tests run against an in-memory H2 database in PostgreSQL mode,
# so they never touch the real Neon database.
spring.datasource.url=jdbc:h2:mem:hireflow;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

app.jwt.secret=hireflow-test-secret-key-0123456789-0123456789
app.jwt.expiration-ms=86400000
app.frontend-url=http://localhost:5173

# Resumes are written under a throwaway temp dir during tests.
app.upload-dir=${java.io.tmpdir}/hireflow-test-uploads

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
